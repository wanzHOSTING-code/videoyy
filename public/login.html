<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videoyy Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:100%;
max-width:400px;
background:#1e293b;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
color:#fff;
text-align:center;
margin-bottom:25px;
font-size:28px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:10px;
background:#334155;
color:#fff;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

#error{
margin-top:15px;
text-align:center;
color:#ef4444;
font-size:14px;
}

.loading{
display:none;
text-align:center;
margin-top:15px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="login-box">

<h1>🎥 Videoyy Admin</h1>

<input
type="email"
id="email"
placeholder="Email Admin">

<input
type="password"
id="password"
placeholder="Password">

<button id="login">

Masuk

</button>

<div class="loading" id="loading">

Memproses Login...

</div>

<div id="error"></div>

</div>

<script type="module" src="./login.js"></script>

</body>
</html>
